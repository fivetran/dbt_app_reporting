schema_variable_name: "apple_store_schema"
additional_schema_variables:
  - "google_play_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "subscriptions and earnings enabled"
    vars:
      apple_store__using_subscriptions: true
      google_play__using_earnings: true
      google_play__using_subscriptions: true
    include_incremental: false
